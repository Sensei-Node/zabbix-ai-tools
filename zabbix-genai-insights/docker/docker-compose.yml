services:
  genai-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${REGISTRY_URL}zabbix-genai-insights:${IMAGE_TAG:-latest}
    container_name: zabbix-genai-insights
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    # environment:
    #   - MCP_ENABLED=${MCP_ENABLED:-false}
    #   - ZABBIX_MCP_URL=${ZABBIX_MCP_URL:-http://zabbix-mcp:8000/sse}
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    restart: always

networks:
  monitoring-network:
    external: true
    name: monitoring-network