zabbix_export:
  version: '7.0'
  media_types:
    - name: OpenAI infrastructure Specialist
      type: SCRIPT
      script_name: genai/openai_alert.py
      parameters:
        - sortorder: '0'
          value: '-z'
        - sortorder: '1'
          value: '-m'
        - sortorder: '2'
          value: '{ALERT.MESSAGE}'
        - sortorder: '3'
          value: '-k'
        - sortorder: '4'
          value: '{ALERT.SENDTO}'
      attempts: '3'
      description: 'Zabbix-OpenAI integration for monitoring infrastructure insights. Add your API Key in the "Send to" field in your user configuration.'
      message_templates:
        - event_source: TRIGGERS
          operation_mode: PROBLEM
          subject: 'Problem: {EVENT.NAME}'
          message: |
            { 
            "NAME": "{EVENT.NAME}", 
            "STATUS": "PROBLEM", 
            "SEVERITY": "{EVENT.SEVERITY}",
            "HOST": "{HOST.NAME}", 
            "DESCRIPTION": "{TRIGGER.DESCRIPTION}", 
            "OPERATIONAL_DATA":  [ "{EVENT.OPDATA}" ], 
            "EVENT_ID": "{EVENT.ID}", 
            "EVENT_TAGS": "{EVENT.TAGS}",
            "URL": "{$ZABBIX.URL}/tr_events.php?triggerid={TRIGGER.ID}&eventid={EVENT.ID}" 
            }
        - event_source: TRIGGERS
          operation_mode: RECOVERY
          subject: 'Resolved: {EVENT.NAME}'
          message: |
            {
            "NAME": "{EVENT.NAME}", 
            "STATUS": "OK",
            "SEVERITY": "{EVENT.SEVERITY}", 
            "HOST": "{HOST.NAME}", 
            "OPERATIONAL_DATA":  [ "{EVENT.OPDATA}" ], 
            "EVENT_ID": "{EVENT.ID}",
            "EVENT_TAGS": "{EVENT.TAGS}",
            "URL": "{$ZABBIX.URL}/tr_events.php?triggerid={TRIGGER.ID}&eventid={EVENT.ID}" 
            }
