<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Zabbix AI Tools — Component Architecture</text>

  <!-- ================================================================== -->
  <!-- ZABBIX (source) -->
  <!-- ================================================================== -->
  <rect x="30" y="260" width="140" height="100" rx="10" fill="#dc2626" filter="url(#shadow)"/>
  <text x="100" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Zabbix</text>
  <text x="100" y="320" text-anchor="middle" font-size="11" fill="#fecaca">Monitoring</text>
  <text x="100" y="336" text-anchor="middle" font-size="11" fill="#fecaca">Platform</text>

  <!-- ================================================================== -->
  <!-- GENAI INSIGHTS (central box) -->
  <!-- ================================================================== -->
  <rect x="260" y="80" width="380" height="480" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">zabbix-genai-insights</text>

  <!-- Entry points -->
  <rect x="285" y="130" width="145" height="52" rx="8" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="357" y="153" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">genai_alert.py</text>
  <text x="357" y="168" text-anchor="middle" font-size="9" fill="#64748b">Standalone CLI</text>

  <rect x="470" y="130" width="145" height="52" rx="8" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="542" y="153" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">docker / app.py</text>
  <text x="542" y="168" text-anchor="middle" font-size="9" fill="#64748b">FastAPI Service</text>

  <!-- genai_engine -->
  <rect x="330" y="210" width="240" height="56" rx="8" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="450" y="235" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">genai_engine.py</text>
  <text x="450" y="252" text-anchor="middle" font-size="10" fill="#dbeafe">Core Analysis Engine</text>

  <!-- llm_provider -->
  <rect x="355" y="296" width="190" height="46" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">llm_provider.py</text>
  <text x="450" y="332" text-anchor="middle" font-size="9" fill="#64748b">Multi-Provider Abstraction</text>

  <!-- siem_fetching -->
  <rect x="285" y="372" width="155" height="56" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="362" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">siem_fetching.py</text>
  <text x="362" y="411" text-anchor="middle" font-size="9" fill="#64748b">SIEM Enrichment</text>

  <!-- mcp_fetching -->
  <rect x="460" y="372" width="155" height="56" rx="8" fill="#fff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="537" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#6b21a8">mcp_fetching.py</text>
  <text x="537" y="411" text-anchor="middle" font-size="9" fill="#64748b">MCP Enrichment</text>

  <!-- db.py -->
  <rect x="370" y="458" width="160" height="46" rx="8" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="480" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">db.py</text>
  <text x="450" y="494" text-anchor="middle" font-size="9" fill="#64748b">Contextual Memory</text>

  <!-- Optional labels -->
  <text x="362" y="440" text-anchor="middle" font-size="8" fill="#b45309" font-style="italic">optional</text>
  <text x="537" y="440" text-anchor="middle" font-size="8" fill="#7e22ce" font-style="italic">optional</text>
  <text x="450" y="516" text-anchor="middle" font-size="8" fill="#15803d" font-style="italic">Docker only</text>

  <!-- ================================================================== -->
  <!-- LLM PROVIDERS (right) -->
  <!-- ================================================================== -->
  <rect x="740" y="150" width="160" height="52" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="820" y="173" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">Google Gemini</text>
  <text x="820" y="189" text-anchor="middle" font-size="9" fill="#64748b">gemini-pro, gemini-1.5-pro</text>

  <rect x="740" y="214" width="160" height="52" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="820" y="237" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">OpenAI</text>
  <text x="820" y="253" text-anchor="middle" font-size="9" fill="#64748b">gpt-4o, gpt-4o-mini</text>

  <rect x="740" y="278" width="160" height="52" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="820" y="301" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">DeepSeek</text>
  <text x="820" y="317" text-anchor="middle" font-size="9" fill="#64748b">deepseek-chat, reasoner</text>

  <rect x="740" y="342" width="160" height="52" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="820" y="365" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">Ollama</text>
  <text x="820" y="381" text-anchor="middle" font-size="9" fill="#64748b">llama3, mistral (local)</text>

  <text x="820" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">LLM Providers</text>

  <!-- ================================================================== -->
  <!-- GRAYLOG (bottom-left) -->
  <!-- ================================================================== -->
  <rect x="30" y="480" width="160" height="80" rx="10" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="110" y="515" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Graylog</text>
  <text x="110" y="535" text-anchor="middle" font-size="10" fill="#fef3c7">SIEM / Log</text>
  <text x="110" y="549" text-anchor="middle" font-size="10" fill="#fef3c7">Management</text>

  <!-- ================================================================== -->
  <!-- MCP SERVER (bottom-right) -->
  <!-- ================================================================== -->
  <rect x="740" y="470" width="180" height="100" rx="10" fill="#a855f7" filter="url(#shadow)"/>
  <text x="830" y="505" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">zabbix-mcp-server</text>
  <text x="830" y="524" text-anchor="middle" font-size="10" fill="#f3e8ff">MCP Server (FastMCP)</text>
  <text x="830" y="540" text-anchor="middle" font-size="10" fill="#f3e8ff">SSE Transport</text>
  <text x="830" y="556" text-anchor="middle" font-size="10" fill="#f3e8ff">Port 8000</text>

  <!-- ================================================================== -->
  <!-- SQLITE (bottom-center) -->
  <!-- ================================================================== -->
  <rect x="400" y="600" width="160" height="70" rx="10" fill="#22c55e" filter="url(#shadow)"/>
  <text x="480" y="632" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">SQLite</text>
  <text x="480" y="650" text-anchor="middle" font-size="10" fill="#dcfce7">Insights Database</text>

  <!-- ================================================================== -->
  <!-- ZABBIX API (far right) -->
  <!-- ================================================================== -->
  <rect x="960" y="280" width="120" height="80" rx="10" fill="#dc2626" filter="url(#shadow)"/>
  <text x="1020" y="315" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Zabbix API</text>
  <text x="1020" y="335" text-anchor="middle" font-size="10" fill="#fecaca">Hosts, Problems</text>
  <text x="1020" y="349" text-anchor="middle" font-size="10" fill="#fecaca">Events, Triggers</text>

  <!-- ================================================================== -->
  <!-- CONNECTIONS -->
  <!-- ================================================================== -->

  <!-- Zabbix → genai_alert.py (webhook / CLI) -->
  <line x1="170" y1="290" x2="283" y2="156" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="210" font-size="9" fill="#64748b" transform="rotate(-30 210,210)">Alert (JSON)</text>

  <!-- Zabbix → docker/app.py (webhook) -->
  <line x1="170" y1="320" x2="468" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="310" y="260" font-size="9" fill="#64748b" transform="rotate(-25 310,260)">POST /analyze</text>

  <!-- genai_alert.py → genai_engine -->
  <line x1="357" y1="182" x2="420" y2="208" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- docker/app.py → genai_engine -->
  <line x1="542" y1="182" x2="480" y2="208" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- genai_engine → llm_provider -->
  <line x1="450" y1="266" x2="450" y2="294" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- genai_engine → siem_fetching -->
  <line x1="400" y1="266" x2="362" y2="370" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-amber)"/>

  <!-- genai_engine → mcp_fetching -->
  <line x1="500" y1="266" x2="537" y2="370" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-purple)"/>

  <!-- genai_engine → db.py -->
  <line x1="450" y1="266" x2="450" y2="456" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>

  <!-- llm_provider → LLM Providers -->
  <line x1="545" y1="319" x2="738" y2="240" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- siem_fetching → Graylog -->
  <line x1="310" y1="428" x2="170" y2="500" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="220" y="458" font-size="9" fill="#b45309">REST API</text>

  <!-- mcp_fetching → MCP Server -->
  <line x1="615" y1="400" x2="738" y2="500" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="660" y="438" font-size="9" fill="#7e22ce">SSE + JSON-RPC</text>

  <!-- db.py → SQLite -->
  <line x1="450" y1="504" x2="470" y2="598" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- MCP Server → Zabbix API -->
  <line x1="920" y1="500" x2="990" y2="362" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="970" y="440" font-size="9" fill="#7e22ce">zabbix-utils</text>

  <!-- Zabbix → Zabbix API (same system) -->
  <path d="M 100 260 Q 100 80 1020 80 Q 1080 80 1080 278" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <text x="550" y="72" text-anchor="middle" font-size="9" fill="#dc2626" font-style="italic">same Zabbix instance</text>

  <!-- ================================================================== -->
  <!-- LEGEND -->
  <!-- ================================================================== -->
  <rect x="30" y="640" width="300" height="70" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="45" y="660" font-size="10" font-weight="600" fill="#475569">Legend</text>
  <line x1="45" y1="675" x2="75" y2="675" stroke="#64748b" stroke-width="2"/>
  <text x="80" y="679" font-size="9" fill="#64748b">Data flow</text>
  <line x1="155" y1="675" x2="185" y2="675" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="190" y="679" font-size="9" fill="#64748b">Optional enrichment</text>
  <line x1="45" y1="695" x2="75" y2="695" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="80" y="699" font-size="9" fill="#64748b">Logical link</text>
</svg>
